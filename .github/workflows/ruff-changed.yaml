name: ruff-changed

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff-changed:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.11'
    - run: uv sync --group dev
    - name: Run ruff on changed Python files
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          base="${{ github.event.pull_request.base.sha }}"
        else
          base="${{ github.event.before }}"
        fi

        mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base" "${{ github.sha }}" -- '*.py')

        if [ "${#files[@]}" -eq 0 ]; then
          echo "No changed Python files."
          exit 0
        fi

        printf 'Ruff checking:\n%s\n' "${files[@]}"
        uv run ruff check --fix --unsafe-fixes --config=ruff.toml "${files[@]}"
